<script>

async function sendEvent(button, action) {

    const res = await fetch('/event', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            button,
            action
        })
    });

    return res.json();
}

function press(button) {

    document
        .getElementById('btn' + button)
        .classList
        .add('pressed');

    sendEvent(button, 'press')
        .then(update);
}

function release(button) {

    document
        .getElementById('btn' + button)
        .classList
        .remove('pressed');

    sendEvent(button, 'release')
        .then(update);
}

function update(data) {

    document.getElementById('last-event').textContent =
        JSON.stringify(data);
}

/* =========================================
   REAL PYTEST RUNNER
========================================= */

async function runAllTests() {

    const btn =
        document.getElementById('run-all-btn');

    const list =
        document.getElementById('test-list');

    btn.disabled = true;
    btn.textContent = "RUNNING...";

    list.innerHTML = "Running pytest tests...";

    try {

        const response = await fetch('/run-tests', {
            method: 'POST'
        });

        const data = await response.json();

        let output =
            data.stdout + "\n" + data.stderr;

        const lines = output.split("\n");

        let html = "";

        for (let line of lines) {

            if (line.includes("PASSED")) {

                html += `
                    <div style="
                        color:#a6e3a1;
                        margin-bottom:4px;
                    ">
                        ${line}
                    </div>
                `;
            }

            else if (line.includes("FAILED")) {

                html += `
                    <div style="
                        color:#f38ba8;
                        margin-bottom:4px;
                    ">
                        ${line}
                    </div>
                `;
            }

            else {

                html += `
                    <div style="
                        color:#cdd6f4;
                        margin-bottom:2px;
                    ">
                        ${line}
                    </div>
                `;
            }
        }

        list.innerHTML = html;
    }

    catch (err) {

        list.innerHTML = `
            <div style="color:red">
                ERROR: ${err}
            </div>
        `;
    }

    btn.disabled = false;
    btn.textContent = "RUN ALL TESTS";
}

</script>
