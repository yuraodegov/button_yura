<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e30;
    --accent:   #00f5c4;
    --accent2:  #7b61ff;
    --danger:   #ff4d6d;
    --warn:     #ffd166;
    --text:     #c8d0e0;
    --dim:      #4a5060;
    --pass:     #00f5c4;
    --fail:     #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.15) 2px,
      rgba(0,0,0,.15) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .wrap { width: 100%; max-width: 760px; }

  /* ── header ── */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,245,196,.4);
  }
  .tag {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .pod-info {
    margin-left: auto;
    font-size: 12px;
    color: var(--dim);
  }
  .pod-info span { color: var(--accent2); }

  /* ── section labels ── */
  .label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── buttons ── */
  .btn-row {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
  }
  .hw-btn {
    position: relative;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all .12s ease;
    box-shadow: 0 0 0 0 rgba(0,245,196,0);
    user-select: none;
    -webkit-user-select: none;
  }
  .hw-btn::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid rgba(0,245,196,.2);
    transition: all .12s ease;
  }
  .hw-btn:hover {
    box-shadow: 0 0 18px rgba(0,245,196,.3);
  }
  .hw-btn.pressed {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 30px rgba(0,245,196,.6), inset 0 0 20px rgba(0,0,0,.3);
    transform: scale(.94);
  }
  .hw-btn.pressed::after {
    border-color: rgba(0,0,0,.3);
  }

  /* hold indicator ring */
  .hw-btn .ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--accent2);
    opacity: 0;
    transition: opacity .2s;
  }
  .hw-btn.holding .ring {
    opacity: 1;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── event feed ── */
  .event-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 32px;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .event-box .cursor {
    width: 8px; height: 14px;
    background: var(--accent);
    display: inline-block;
    animation: blink .8s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .event-line {
    font-size: 13px;
    line-height: 1.5;
    animation: fadeSlide .2s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .event-line .k { color: var(--dim); }
  .event-line .v { color: var(--accent); }
  .event-line .vp { color: var(--accent2); }
  .event-line .vw { color: var(--warn); }
  .event-line .ve { color: var(--danger); }

  /* ── status badges ── */
  .status-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background .3s, box-shadow .3s;
  }
  .badge.ok .dot  { background: var(--pass); box-shadow: 0 0 8px var(--pass); }
  .badge.err .dot { background: var(--fail); box-shadow: 0 0 8px var(--fail); }
  .badge.warn .dot{ background: var(--warn); box-shadow: 0 0 8px var(--warn); }

  /* ── run button ── */
  #run-btn {
    width: 100%;
    padding: 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    background: transparent;
    border: 2px solid var(--accent2);
    color: var(--accent2);
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  #run-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent2);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .3s ease;
    z-index: 0;
  }
  #run-btn:hover::before { transform: scaleX(1); }
  #run-btn:hover { color: #fff; }
  #run-btn span { position: relative; z-index: 1; }
  #run-btn:disabled { opacity: .4; cursor: not-allowed; }
  #run-btn:disabled::before { transform: scaleX(0); }

  /* progress bar */
  #progress {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
    display: none;
  }
  #progress.active { display: block; }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    width: 0%;
    transition: width .4s ease;
    animation: shimmer 1.5s ease infinite;
    background-size: 200% 100%;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── test summary ── */
  .summary-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    font-size: 12px;
    display: none;
  }
  .summary-bar.show { display: flex; }
  .s-pass { color: var(--pass); }
  .s-fail { color: var(--fail); }
  .s-total { color: var(--dim); }

  /* ── test output ── */
  #test-out {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    min-height: 200px;
    font-size: 12px;
    line-height: 1.7;
    overflow-x: auto;
  }
  .t-line { white-space: pre; }
  .t-pass { color: var(--pass); }
  .t-fail { color: var(--fail); }
  .t-warn { color: var(--warn); }
  .t-dim  { color: var(--dim); }
  .t-head { color: var(--accent2); letter-spacing: 1px; }

  /* ── history log ── */
  .history-wrap {
    margin-top: 32px;
  }
  #history {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.8;
    display: flex;
    flex-direction: column-reverse;
  }
  .h-entry { color: var(--dim); }
  .h-entry .ts { color: var(--accent2); margin-right: 8px; }
  .h-entry .ev { color: var(--text); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>BTNSIM</h1>
    <span class="tag">// hardware simulator v2</span>
    <span class="pod-info">pod: <span id="pod-name">—</span></span>
  </header>

  <!-- buttons -->
  <div class="label">// INPUT CONTROLS</div>
  <div class="btn-row">
    <button class="hw-btn" id="b1"
      onmousedown="press(1)" onmouseup="release(1)" onmouseleave="release(1)"
      ontouchstart="press(1)" ontouchend="release(1)">
      <div class="ring"></div>BTN 1
    </button>
    <button class="hw-btn" id="b2"
      onmousedown="press(2)" onmouseup="release(2)" onmouseleave="release(2)"
      ontouchstart="press(2)" ontouchend="release(2)">
      <div class="ring"></div>BTN 2
    </button>
    <button class="hw-btn" id="b3"
      onmousedown="press(3)" onmouseup="release(3)" onmouseleave="release(3)"
      ontouchstart="press(3)" ontouchend="release(3)">
      <div class="ring"></div>BTN 3
    </button>
  </div>

  <!-- live event -->
  <div class="label">// LAST EVENT</div>
  <div class="event-box" id="event-box">
    <span class="t-dim">waiting for input<span class="cursor"></span></span>
  </div>

  <!-- status badges -->
  <div class="label">// SYSTEM STATUS</div>
  <div class="status-row">
    <div class="badge" id="badge-server">
      <div class="dot"></div><span>SERVER</span>
    </div>
    <div class="badge" id="badge-fsm">
      <div class="dot"></div><span>FSM</span>
    </div>
    <div class="badge" id="badge-dispense">
      <div class="dot"></div><span>DISPENSE</span>
    </div>
    <div class="badge" id="badge-level">
      <div class="dot"></div><span>LEVEL</span>
    </div>
    <div class="badge" id="badge-tests">
      <div class="dot"></div><span>TESTS</span>
    </div>
  </div>

  <!-- run tests -->
  <button id="run-btn" onclick="runTests()"><span>▶ RUN ALL TESTS</span></button>
  <div id="progress"><div id="progress-bar"></div></div>

  <div class="summary-bar" id="summary">
    <span class="s-pass" id="s-pass">✓ 0 passed</span>
    <span class="s-fail" id="s-fail">✗ 0 failed</span>
    <span class="s-total" id="s-total">0 total</span>
  </div>

  <div id="test-out"><span class="t-dim">// run tests to see output</span></div>

  <!-- history -->
  <div class="history-wrap">
    <div class="label">// EVENT HISTORY</div>
    <div id="history"><span class="t-dim">// no events yet</span></div>
  </div>

</div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
const holdTimers = {};

// ── badge helpers ──────────────────────────────────────────────────────────
function setBadge(id, state) { // 'ok' | 'err' | 'warn' | ''
  const el = document.getElementById('badge-' + id);
  el.className = 'badge' + (state ? ' ' + state : '');
}

function pingServer() {
  fetch('/').then(r => setBadge('server', r.ok ? 'ok' : 'err'))
            .catch(() => setBadge('server', 'err'));
}
pingServer();

// ── event display ──────────────────────────────────────────────────────────
function renderEvent(data) {
  document.getElementById('pod-name').textContent = data.pod || '—';

  const box = document.getElementById('event-box');
  box.innerHTML = Object.entries(data).map(([k, v]) => {
    let cls = 'v';
    if (k === 'error')  cls = 've';
    if (k === 'state')  cls = 'vp';
    if (k === 'action') cls = 'vw';
    return `<div class="event-line"><span class="k">${k}: </span><span class="${cls}">${JSON.stringify(v)}</span></div>`;
  }).join('');

  // update FSM badge
  if (data.error) {
    setBadge('fsm', 'err');
  } else {
    setBadge('fsm', 'ok');
  }

  // check dispense / level in state string
  const stateStr = JSON.stringify(data).toLowerCase();
  if (stateStr.includes('dispense')) setBadge('dispense', 'ok');
  if (stateStr.includes('level'))    setBadge('level', 'ok');

  addHistory(data);
}

// ── history ────────────────────────────────────────────────────────────────
function addHistory(data) {
  const log = document.getElementById('history');
  const ts  = new Date().toLocaleTimeString('en-GB', {hour12: false});
  const btn = data.button ?? '?';
  const act = data.action ?? data.state ?? JSON.stringify(data);
  const entry = document.createElement('div');
  entry.className = 'h-entry';
  entry.innerHTML = `<span class="ts">${ts}</span><span class="ev">BTN${btn} → ${act}</span>`;
  log.prepend(entry);
}

// ── button press / release ─────────────────────────────────────────────────
async function sendEvent(button, action) {
  const res = await fetch('/event', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({button, action})
  });
  return res.json();
}

function press(btn) {
  const el = document.getElementById('b' + btn);
  el.classList.add('pressed');

  // hold indicator after 500ms
  holdTimers[btn] = setTimeout(() => el.classList.add('holding'), 500);

  sendEvent(btn, 'press').then(renderEvent).catch(console.error);
}

function release(btn) {
  const el = document.getElementById('b' + btn);
  if (!el.classList.contains('pressed')) return;
  el.classList.remove('pressed', 'holding');
  clearTimeout(holdTimers[btn]);

  sendEvent(btn, 'release').then(renderEvent).catch(console.error);
}

// ── run tests ──────────────────────────────────────────────────────────────
async function runTests() {
  const btn  = document.getElementById('run-btn');
  const out  = document.getElementById('test-out');
  const prog = document.getElementById('progress');
  const bar  = document.getElementById('progress-bar');
  const sum  = document.getElementById('summary');

  btn.disabled = true;
  prog.classList.add('active');
  bar.style.width = '0%';
  out.innerHTML = '<span class="t-dim">// executing pytest...</span>';
  sum.classList.remove('show');

  // animate progress bar
  let pct = 0;
  const ticker = setInterval(() => {
    pct = Math.min(pct + Math.random() * 8, 88);
    bar.style.width = pct + '%';
  }, 200);

  try {
    const res  = await fetch('/run-tests', {method: 'POST'});
    const data = await res.json();

    clearInterval(ticker);
    bar.style.width = '100%';

    const raw = (data.stdout + '\n' + data.stderr).split('\n');

    let passed = 0, failed = 0;
    let html = '';

    for (const line of raw) {
      let cls = 't-dim';
      if (/PASSED/.test(line))  { cls = 't-pass'; passed++; }
      else if (/FAILED|ERROR/.test(line)) { cls = 't-fail'; failed++; }
      else if (/WARNING/.test(line))       cls = 't-warn';
      else if (/={3,}|_{3,}/.test(line))  cls = 't-head';
      html += `<div class="t-line ${cls}">${escHtml(line)}</div>`;
    }

    out.innerHTML = html;

    // summary
    const total = passed + failed;
    document.getElementById('s-pass').textContent  = `✓ ${passed} passed`;
    document.getElementById('s-fail').textContent  = `✗ ${failed} failed`;
    document.getElementById('s-total').textContent = `${total} total`;
    sum.classList.add('show');

    // badge
    setBadge('tests', failed === 0 && total > 0 ? 'ok' : failed > 0 ? 'err' : 'warn');

  } catch (err) {
    clearInterval(ticker);
    out.innerHTML = `<span class="t-fail">// fetch error: ${escHtml(String(err))}</span>`;
    setBadge('tests', 'err');
  }

  setTimeout(() => { prog.classList.remove('active'); bar.style.width = '0%'; }, 600);
  btn.disabled = false;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
