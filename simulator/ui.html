<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Button Simulator</title>

<style>

body{
    background:#1e1e2e;
    color:#cdd6f4;
    font-family:monospace;
    display:flex;
    justify-content:center;
    padding-top:40px;
}

.container{
    width:700px;
}

h1{
    color:#89b4fa;
}

.buttons{
    display:flex;
    gap:20px;
    margin-top:30px;
}

.btn{
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid #89b4fa;
    background:transparent;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.btn.pressed{
    background:#89b4fa;
    color:black;
}

#last-event{
    margin-top:30px;
    background:#313244;
    padding:20px;
    border-radius:10px;
    color:#a6e3a1;
}

#test-list{
    margin-top:20px;
    background:#11111b;
    padding:20px;
    border-radius:10px;
    min-height:200px;
}

#run-all-btn{
    margin-top:20px;
    width:100%;
    padding:15px;
    font-size:18px;
    background:#89b4fa;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>BUTTON SIMULATOR</h1>

<div class="buttons">

<button
    id="btn1"
    class="btn"
    onmousedown="press(1)"
    onmouseup="release(1)">
    BTN1
</button>

<button
    id="btn2"
    class="btn"
    onmousedown="press(2)"
    onmouseup="release(2)">
    BTN2
</button>

<button
    id="btn3"
    class="btn"
    onmousedown="press(3)"
    onmouseup="release(3)">
    BTN3
</button>

</div>

<div id="last-event">
    waiting event...
</div>

<button
    id="run-all-btn"
    onclick="runAllTests()">
    RUN ALL TESTS
</button>

<div id="test-list">
    tests output...
</div>

<script>

async function sendEvent(button, action) {

    const res = await fetch('/event', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            button,
            action
        })
    });

    return res.json();
}

function press(button) {

    document
        .getElementById('btn' + button)
        .classList
        .add('pressed');

    sendEvent(button, 'press')
        .then(update);
}

function release(button) {

    document
        .getElementById('btn' + button)
        .classList
        .remove('pressed');

    sendEvent(button, 'release')
        .then(update);
}

function update(data) {

    document.getElementById('last-event').textContent =
        JSON.stringify(data);
}

async function runAllTests() {

    const btn =
        document.getElementById('run-all-btn');

    const list =
        document.getElementById('test-list');

    btn.disabled = true;
    btn.textContent = "RUNNING...";

    list.innerHTML = "Running pytest tests...";

    try {

        const response = await fetch('/run-tests', {
            method: 'POST'
        });

        const data = await response.json();

        let output =
            data.stdout + "\n" + data.stderr;

        const lines = output.split("\n");

        let html = "";

        for (let line of lines) {

            if (line.includes("PASSED")) {

                html += `
                    <div style="
                        color:#a6e3a1;
                        margin-bottom:4px;
                    ">
                        ${line}
                    </div>
                `;
            }

            else if (line.includes("FAILED")) {

                html += `
                    <div style="
                        color:#f38ba8;
                        margin-bottom:4px;
                    ">
                        ${line}
                    </div>
                `;
            }

            else {

                html += `
                    <div style="
                        color:#cdd6f4;
                        margin-bottom:2px;
                    ">
                        ${line}
                    </div>
                `;
            }
        }

        list.innerHTML = html;
    }

    catch (err) {

        list.innerHTML = `
            <div style="color:red">
                ERROR: ${err}
            </div>
        `;
    }

    btn.disabled = false;
    btn.textContent = "RUN ALL TESTS";
}

</script>

</body>
</html>
