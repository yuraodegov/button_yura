name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. сборка C бинарника ──────────────────────────────────────────────
  build-c:
    name: Build C binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gcc
        run: sudo apt-get install -y gcc

      - name: Compile test_button
        run: |
          cd app
          gcc button.c mocks.c test_runner.c -o test_button

      - name: Smoke run binary
        run: |
          ./app/test_button | tee /tmp/binary_output.txt
          grep "START TEST" /tmp/binary_output.txt
          grep "END TEST"   /tmp/binary_output.txt

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: test_button
          path: app/test_button

  # ── 2. тесты C бинарника ──────────────────────────────────────────────
  test-c:
    name: Pytest — C binary tests
    runs-on: ubuntu-latest
    needs: build-c
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: test_button
          path: app/

      - name: Mark executable
        run: chmod +x app/test_button

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run C binary tests
        run: python -m pytest tests/test_buttons.py -v --tb=short

  # ── 3. тесты HTTP сервера ─────────────────────────────────────────────
  test-server:
    name: Pytest — HTTP server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run server tests
        run: python -m pytest tests/test_server.py -v --tb=short

  # ── 4. сборка Docker образа ───────────────────────────────────────────
  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test-c, test-server]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t button-yura .

      - name: Smoke test container
        run: |
          docker run -d -p 5000:5000 --name smoke button-yura
          sleep 3
          curl -f http://localhost:5000/ || (docker logs smoke && exit 1)
          docker stop smoke

  # ── 5. деплой на EC2 ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /home/ec2-user/button_yura
            git pull

            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm   $(docker ps -aq) 2>/dev/null || true

            docker build -t button-yura .
            docker run -d -p 5000:5000 --restart unless-stopped button-yura

            echo "Deploy done: $(date)"